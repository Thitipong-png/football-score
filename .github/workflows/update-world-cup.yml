name: Update World Cup scores

on:
  schedule:
    - cron: "7 0,2,4,6,8,18,20,22 * * *"
      timezone: "Asia/Bangkok"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: world-cup-score-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Fetch World Cup scores
        env:
          API_FOOTBALL_KEY: ${{ secrets.API_FOOTBALL_KEY }}
        run: node scripts/update-world-cup.mjs
      - name: Commit fresh data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/world-cup.json
          git diff --cached --quiet || git commit -m "Update World Cup scores"
          git push
